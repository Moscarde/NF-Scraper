version: "3.9"

networks:
  nfe_net:
    driver: bridge

volumes:
  postgres_data:
  received_images:
  scraped_html:

services:
  # -----------------------------------------------------------
  # PostgreSQL 16
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nfe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------
  # Redis 7
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - nfe_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -----------------------------------------------------------
  # Bot Telegram
  # -----------------------------------------------------------
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - received_images:/app/received_images
    networks:
      - nfe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------
  # Worker: leitura de QR Code
  # -----------------------------------------------------------
  worker_qr:
    build: ./workers
    command: python worker_qr.py
    restart: unless-stopped
    env_file: .env
    volumes:
      - received_images:/app/received_images:ro
    networks:
      - nfe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=__import__('os').getenv('REDIS_HOST','redis'); print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------
  # Worker: scraping + parser + silver
  # -----------------------------------------------------------
  worker_scraper:
    build: ./workers
    command: python worker_scraper.py
    restart: unless-stopped
    env_file: .env
    volumes:
      - received_images:/app/received_images:ro
      - scraped_html:/app/scraped_html
    networks:
      - nfe_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
